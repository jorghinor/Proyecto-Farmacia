services:
  app:
    build: .
    volumes:
      - ./backend:/var/www/html
    ports:
      - "8000:80"
      - "5173:5173"
    depends_on:
      - db
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: farmacia
      POSTGRES_USER: farmacia
      POSTGRES_PASSWORD: farmacia123
    ports:
      - "5434:5432"
    volumes:
      - ./db_data:/var/lib/postgresql/data

# Ya no necesitamos la sección de volumes al final
